# FirePulse DHCP + DNS for the hotspot network
# Assigns IPs to ESP32s and instructor devices

# Only listen on the hotspot interface
interface=wlan0
bind-interfaces

# DHCP range: 10.0.50.10 - 10.0.50.200, 12 hour lease
dhcp-range=10.0.50.10,10.0.50.200,255.255.255.0,12h

# Pi's static IP on the hotspot network
listen-address=10.0.50.1

# Resolve firepulse.local to the Pi
address=/firepulse.local/10.0.50.1

# DNS — forward external queries (optional, not needed for ESP32s)
server=8.8.8.8
