# FirePulse Wi-Fi Hotspot Configuration
# This runs on the onboard Wi-Fi (wlan0) or Alfa USB adapter (wlan1)
# The setup script will auto-detect and set the correct interface.

interface=wlan0
driver=nl80211

# Network name and security
ssid=FirePulse
wpa=2
wpa_passphrase=firepulse123
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP

# 2.4 GHz — required for ESP32 compatibility
hw_mode=g
channel=6
ieee80211n=1

# Performance tuning for many clients
wmm_enabled=1
max_num_sta=50
